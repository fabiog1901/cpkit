<template
  id="cpkit-extension-brand"
  data-logo-text="td"
  data-app-name="TODO"
  data-login-subtitle="Authenticate to manage example tasks"
></template>

<template id="cpkit-extension-dashboard">
  <div class="dashboard-grid">
    <article class="dashboard-card" data-dashboard-key="todo-open-tasks">
      <div class="dashboard-card-head">
        <div>
          <div class="dashboard-card-kicker">TODO</div>
          <h3>Open Tasks</h3>
        </div>
        <div class="dashboard-stat" x-text="todos.filter((todo) => !todo.completed).length"></div>
      </div>
      <p>Tasks still waiting for someone to close them out.</p>
    </article>

    <article class="dashboard-card" data-dashboard-key="todo-completed-tasks">
      <div class="dashboard-card-head">
        <div>
          <div class="dashboard-card-kicker">TODO</div>
          <h3>Completed Tasks</h3>
        </div>
        <div class="dashboard-stat" x-text="todos.filter((todo) => todo.completed).length"></div>
      </div>
      <p>Finished work included by the current TODO filter.</p>
    </article>

    <article class="dashboard-card todo-dashboard-card" data-dashboard-key="todo-recent-tasks">
      <div class="dashboard-card-head">
        <div>
          <div class="dashboard-card-kicker">TODO</div>
          <h3>Recent Tasks</h3>
        </div>
        <button type="button" class="dashboard-link-button" @click="setView('todos')">Open Todos</button>
      </div>
      <div class="todo-dashboard-list">
        <template x-for="todo in todos.slice(0, 5)" :key="`dashboard-todo-${todo.todo_id}`">
          <div class="todo-dashboard-item">
            <span class="todo-dashboard-title" x-text="todo.title"></span>
            <span
              class="status-pill"
              :class="todo.completed ? 'success' : 'pending'"
              x-text="todo.completed ? 'completed' : 'open'"
            ></span>
          </div>
        </template>
        <div class="empty-cell" x-show="todos.length === 0">No tasks yet.</div>
      </div>
    </article>
  </div>
</template>

<main class="layout" x-show="view === 'todos'">
  <aside class="sidebar">
    <section>
      <h2>Todos</h2>
      <div class="metric button-stack">
        <button class="btn primary" @click="openTodoModal()">Create Task</button>
        <button class="btn" @click="exportTodos()" :disabled="todosLoading.export">
          <span x-show="!todosLoading.export">Export Tasks</span>
          <span x-show="todosLoading.export">Exporting...</span>
        </button>
        <button class="btn" @click="refreshTodos()" :disabled="todosLoading.list">Refresh</button>
      </div>
    </section>
    <section>
      <h2>Filter</h2>
      <input
        class="input"
        type="search"
        x-model="todosFilterQuery"
        @input="applyTodosFilterSort()"
        placeholder="Search tasks"
      />
    </section>
    <section>
      <h2>Options</h2>
      <label class="check-row">
        <input type="checkbox" x-model="todosIncludeCompleted" @change="refreshTodos()" />
        Include completed
      </label>
    </section>
  </aside>

  <section class="main">
    <div class="section-head">
      <div>
        <h2>Todos</h2>
        <p>Tasks managed by the example app API.</p>
      </div>
      <div class="timestamp" x-text="todosLastUpdatedUtc || '-'"></div>
    </div>
    <div
      class="notice"
      :class="{ danger: !todosToast.ok, success: todosToast.ok }"
      x-show="todosToast.message"
      x-text="todosToast.message"
    ></div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th @click="sortTodos(0)" :class="todosSortClass(0)">ID</th>
            <th @click="sortTodos(1)" :class="todosSortClass(1)">Task</th>
            <th @click="sortTodos(2)" :class="todosSortClass(2)">Status</th>
            <th @click="sortTodos(3)" :class="todosSortClass(3)">Updated</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <template x-for="todo in todosVisibleRows" :key="todo.todo_id">
            <tr :class="{ 'todo-row-completed': todo.completed }">
              <td x-text="todo.todo_id"></td>
              <td class="todo-title-cell">
                <div class="todo-title strong" x-text="todo.title"></div>
                <div class="todo-notes" x-show="todo.notes" x-text="todo.notes"></div>
              </td>
              <td>
                <span
                  class="status-pill"
                  :class="todo.completed ? 'success' : 'pending'"
                  x-text="todo.completed ? 'completed' : 'open'"
                ></span>
              </td>
              <td x-text="toUtcStringMaybe(todo.updated_at)"></td>
              <td>
                <div class="todo-actions">
                  <button class="btn" @click="openTodoModal(todo)">Update</button>
                  <button class="btn danger" @click="deleteTodo(todo)">Delete</button>
                </div>
              </td>
            </tr>
          </template>
          <tr x-show="todosVisibleRows.length === 0">
            <td colspan="5" class="empty-cell">No tasks found.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>
</main>

<div class="modal-backdrop" x-show="modal.todoEditor.open" @click.self="closeTodoModal()">
  <div class="modal">
    <div class="modal-head">
      <h2 x-text="modal.todoEditor.todo_id ? 'Update Task' : 'Create Task'"></h2>
      <button class="icon-btn" @click="closeTodoModal()">x</button>
    </div>
    <div class="todo-modal-grid">
      <div>
        <label class="field-label">Title</label>
        <input class="input" x-model="modal.todoEditor.title" placeholder="Task title" />
      </div>
      <div>
        <label class="field-label">Notes</label>
        <textarea
          class="input todo-textarea"
          x-model="modal.todoEditor.notes"
          placeholder="Optional notes"
        ></textarea>
      </div>
      <label class="check-row" x-show="modal.todoEditor.todo_id">
        <input type="checkbox" x-model="modal.todoEditor.completed" />
        Completed
      </label>
    </div>
    <div class="notice danger" x-show="modalError.todoEditor" x-text="modalError.todoEditor"></div>
    <div class="modal-actions">
      <button class="btn" @click="closeTodoModal()">Cancel</button>
      <button class="btn primary" @click="saveTodo()" :disabled="todosLoading.save">
        <span x-show="!todosLoading.save">Save</span>
        <span x-show="todosLoading.save">Saving...</span>
      </button>
    </div>
  </div>
</div>
